name: Security SCA

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/admin/**'
      - 'apps/mobile/**'
      - 'packages/api/**'
      - 'packages/shared/**'
      - 'packages/db/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - '*.config.{js,ts,mjs}'
      - '.github/workflows/security-*.yml'
      - 'docs/security/**'
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'apps/mobile/**'
      - 'packages/api/**'
      - 'packages/shared/**'
      - 'packages/db/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - '*.config.{js,ts,mjs}'
      - '.github/workflows/security-*.yml'
      - 'docs/security/**'
  schedule:
    - cron: '0 6 * * 2'

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package manager
        id: pm
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> $GITHUB_OUTPUT
          elif [ -f package-lock.json ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
          else
            echo "manager=none" >> $GITHUB_OUTPUT
          fi

      - name: Setup pnpm
        if: steps.pm.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: Setup Node (pnpm)
        if: steps.pm.outputs.manager == 'pnpm'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Node (npm)
        if: steps.pm.outputs.manager == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run dependency audit
        id: audit
        continue-on-error: true
        run: |
          set +e
          if [ "${{ steps.pm.outputs.manager }}" = "pnpm" ]; then
            pnpm audit --audit-level critical --json > audit-results.json
            exit_code=$?
          elif [ "${{ steps.pm.outputs.manager }}" = "npm" ]; then
            npm audit --audit-level=critical --json > audit-results.json
            exit_code=$?
          else
            echo '{"note":"No pnpm-lock.yaml or package-lock.json found; dependency audit skipped"}' > audit-results.json
            exit_code=0
          fi
          set -e
          echo "exit-code=$exit_code" >> $GITHUB_OUTPUT

      - name: Upload audit results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-audit-results
          path: audit-results.json
          retention-days: 30

      - name: Fail on critical vulnerabilities
        run: |
          critical_count="$(jq -r '.metadata.vulnerabilities.critical // 0' audit-results.json 2>/dev/null || echo 0)"
          if [ "$critical_count" -gt 0 ]; then
            echo "::error::Found critical npm vulnerabilities ($critical_count)"
            cat audit-results.json
            exit 1
          fi
          echo "No critical npm vulnerabilities found."

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Gate high/critical vulnerabilities
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            aquasec/trivy:0.56.1 \
            fs \
            --scanners vuln \
            --severity CRITICAL \
            --exit-code 1 \
            --no-progress \
            .

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs
