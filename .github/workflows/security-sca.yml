name: Security SCA

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/admin/**'
      - 'apps/mobile/**'
      - 'packages/api/**'
      - 'packages/shared/**'
      - 'packages/db/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - '*.config.{js,ts,mjs}'
      - '.github/workflows/security-*.yml'
      - 'docs/security/**'
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'apps/mobile/**'
      - 'packages/api/**'
      - 'packages/shared/**'
      - 'packages/db/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - '*.config.{js,ts,mjs}'
      - '.github/workflows/security-*.yml'
      - 'docs/security/**'
  schedule:
    - cron: '0 6 * * 2'

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package manager
        id: pm
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> $GITHUB_OUTPUT
          elif [ -f package-lock.json ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
          else
            echo "manager=none" >> $GITHUB_OUTPUT
          fi

      - name: Setup pnpm
        if: steps.pm.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node (pnpm)
        if: steps.pm.outputs.manager == 'pnpm'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Node (npm)
        if: steps.pm.outputs.manager == 'npm'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (pnpm)
        if: steps.pm.outputs.manager == 'pnpm'
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (npm)
        if: steps.pm.outputs.manager == 'npm'
        run: npm ci

      - name: Run dependency audit
        id: audit
        continue-on-error: true
        run: |
          set +e
          if [ "${{ steps.pm.outputs.manager }}" = "pnpm" ]; then
            pnpm audit --audit-level high --json > audit-results.json
            exit_code=$?
          elif [ "${{ steps.pm.outputs.manager }}" = "npm" ]; then
            npm audit --audit-level=high --json > audit-results.json
            exit_code=$?
          else
            echo '{"note":"No pnpm-lock.yaml or package-lock.json found; dependency audit skipped"}' > audit-results.json
            exit_code=0
          fi
          set -e
          echo "exit-code=$exit_code" >> $GITHUB_OUTPUT

      - name: Upload audit results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-audit-results
          path: audit-results.json
          retention-days: 30

      - name: Fail on high/critical vulnerabilities
        if: steps.audit.outputs.exit-code != '0'
        run: |
          echo "::error::Found high or critical npm vulnerabilities"
          cat audit-results.json
          exit 1

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs
