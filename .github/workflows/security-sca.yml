name: Security SCA

on:
  pull_request:
    paths:
      - 'apps/admin/**'
      - 'apps/mobile/**'
      - 'packages/api/**'
      - 'packages/shared/**'
      - 'packages/db/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - '*.config.{js,ts,mjs}'
      - '.github/workflows/security-*.yml'
      - 'docs/security/**'
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'apps/mobile/**'
      - 'packages/api/**'
      - 'packages/shared/**'
      - 'packages/db/**'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - '*.config.{js,ts,mjs}'
      - '.github/workflows/security-*.yml'
      - 'docs/security/**'
  schedule:
    - cron: '0 6 * * 2'

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        id: audit
        continue-on-error: true
        run: |
          pnpm audit --audit-level high --json > audit-results.json || true
          exit_code=$?
          echo "exit-code=$exit_code" >> $GITHUB_OUTPUT

      - name: Upload audit results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-audit-results
          path: audit-results.json
          retention-days: 30

      - name: Fail on high/critical vulnerabilities
        if: steps.audit.outputs.exit-code != '0'
        run: |
          echo "::error::Found high or critical npm vulnerabilities"
          cat audit-results.json
          exit 1

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs
