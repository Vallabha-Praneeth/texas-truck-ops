name: Security ZAP Baseline

on:
  workflow_dispatch:
  
  pull_request:
    paths:
      - 'apps/admin/**'
      - 'packages/api/**'
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - '.github/workflows/security-zap.yml'
      - 'docs/security/**'
  
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'packages/api/**'
  
  schedule:
    - cron: '0 7 * * 3'  # Wednesday 07:00 UTC

permissions:
  contents: read

jobs:
  check-secrets:
    name: Validate ZAP Targets
    runs-on: ubuntu-latest
    outputs:
      admin-configured: ${{ steps.check.outputs.admin }}
      api-configured: ${{ steps.check.outputs.api }}
    steps:
      - id: check
        run: |
          admin_url="${{ secrets.ZAP_TARGET_ADMIN_URL }}"
          api_url="${{ secrets.ZAP_TARGET_API_URL }}"
          
          # Validate Admin URL
          if [ -n "$admin_url" ]; then
            # Check URL format
            if [[ "$admin_url" =~ ^https?:// ]]; then
              # Ensure not production
              if [[ "$admin_url" == *"production"* ]] || [[ "$admin_url" == *"prod."* ]]; then
                echo "admin=false" >> $GITHUB_OUTPUT
                echo "::error::ZAP_TARGET_ADMIN_URL appears to target production! Use staging only."
              else
                echo "admin=true" >> $GITHUB_OUTPUT
                echo "✓ Admin URL configured: ${admin_url}"
              fi
            else
              echo "admin=false" >> $GITHUB_OUTPUT
              echo "::error::ZAP_TARGET_ADMIN_URL is not a valid URL (must start with http:// or https://)"
            fi
          else
            echo "admin=false" >> $GITHUB_OUTPUT
            echo "::warning::ZAP_TARGET_ADMIN_URL not configured - Admin scan will be skipped"
          fi
          
          # Validate API URL
          if [ -n "$api_url" ]; then
            if [[ "$api_url" =~ ^https?:// ]]; then
              if [[ "$api_url" == *"production"* ]] || [[ "$api_url" == *"prod."* ]]; then
                echo "api=false" >> $GITHUB_OUTPUT
                echo "::error::ZAP_TARGET_API_URL appears to target production! Use staging only."
              else
                echo "api=true" >> $GITHUB_OUTPUT
                echo "✓ API URL configured: ${api_url}"
              fi
            else
              echo "api=false" >> $GITHUB_OUTPUT
              echo "::error::ZAP_TARGET_API_URL is not a valid URL"
            fi
          else
            echo "api=false" >> $GITHUB_OUTPUT
            echo "::warning::ZAP_TARGET_API_URL not configured - API scan will be skipped"
          fi

  zap-admin:
    name: ZAP Baseline - Admin
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.admin-configured == 'true'
    steps:
      - name: Checkout (for custom rules)
        uses: actions/checkout@v4
      
      - name: Verify staging environment
        run: |
          target="${{ secrets.ZAP_TARGET_ADMIN_URL }}"
          echo "Testing connectivity to $target"
          
          status=$(curl -s -o /dev/null -w "%{http_code}" "$target" || echo "000")
          
          if [ "$status" = "000" ]; then
            echo "::error::Cannot connect to staging environment"
            exit 1
          elif [ "$status" != "200" ] && [ "$status" != "301" ] && [ "$status" != "302" ]; then
            echo "::warning::Staging returned HTTP $status (not 200/301/302)"
          else
            echo "✓ Staging environment responsive (HTTP $status)"
          fi
      
      - name: ZAP Baseline Scan
        run: |
          docker run --rm \
            -u root \
            -v "$PWD:/zap/wrk/:rw" \
            --network=host \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "${{ secrets.ZAP_TARGET_ADMIN_URL }}" \
            -J report_json.json \
            -w report_md.md \
            -r report_html.html \
            --autooff \
            -I \
            -m 15 \
            -T 30 \
            -c .zap/baseline-rules.tsv

      - name: Gate fail-level alerts (Admin)
        run: |
          fail_ids_json=$(
            awk -F '\t' '
              $1 ~ /^[0-9]+$/ && $2 == "FAIL" {
                if (ids != "") ids = ids ","
                ids = ids "\"" $1 "\""
              }
              END { print "[" ids "]" }
            ' .zap/baseline-rules.tsv
          )

          fail_count=$(
            jq --argjson fail_ids "$fail_ids_json" '
              [.site[]?.alerts[]? | select(.pluginid as $id | ($fail_ids | index($id)) != null)] | length
            ' report_json.json
          )

          echo "Fail-level alerts detected (admin): $fail_count"
          if [ "$fail_count" -gt 0 ]; then
            echo "::error::Admin ZAP report contains fail-level alerts"
            jq --argjson fail_ids "$fail_ids_json" '
              .site[]?.alerts[]? | select(.pluginid as $id | ($fail_ids | index($id)) != null) |
              {pluginid, name, riskdesc, count}
            ' report_json.json
            exit 1
          fi
      
      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-admin-baseline-report
          path: |
            report_html.html
            report_md.md
            report_json.json
          retention-days: 90

  zap-api:
    name: ZAP Baseline - API
    runs-on: ubuntu-latest
    needs: check-secrets
    if: needs.check-secrets.outputs.api-configured == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Verify staging environment
        run: |
          target="${{ secrets.ZAP_TARGET_API_URL }}"
          echo "Testing connectivity to $target/api/health"
          
          status=$(curl -s -o /dev/null -w "%{http_code}" "$target/api/health" || echo "000")
          
          if [ "$status" = "000" ]; then
            echo "::error::Cannot connect to API staging environment"
            exit 1
          elif [ "$status" != "200" ]; then
            echo "::warning::API health check returned HTTP $status"
          else
            echo "✓ API staging environment healthy (HTTP $status)"
          fi
      
      - name: ZAP Baseline Scan
        run: |
          docker run --rm \
            -u root \
            -v "$PWD:/zap/wrk/:rw" \
            --network=host \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "${{ secrets.ZAP_TARGET_API_URL }}" \
            -J report_json.json \
            -w report_md.md \
            -r report_html.html \
            --autooff \
            -I \
            -m 15 \
            -T 30 \
            -c .zap/baseline-rules.tsv

      - name: Gate fail-level alerts (API)
        run: |
          fail_ids_json=$(
            awk -F '\t' '
              $1 ~ /^[0-9]+$/ && $2 == "FAIL" {
                if (ids != "") ids = ids ","
                ids = ids "\"" $1 "\""
              }
              END { print "[" ids "]" }
            ' .zap/baseline-rules.tsv
          )

          fail_count=$(
            jq --argjson fail_ids "$fail_ids_json" '
              [.site[]?.alerts[]? | select(.pluginid as $id | ($fail_ids | index($id)) != null)] | length
            ' report_json.json
          )

          echo "Fail-level alerts detected (api): $fail_count"
          if [ "$fail_count" -gt 0 ]; then
            echo "::error::API ZAP report contains fail-level alerts"
            jq --argjson fail_ids "$fail_ids_json" '
              .site[]?.alerts[]? | select(.pluginid as $id | ($fail_ids | index($id)) != null) |
              {pluginid, name, riskdesc, count}
            ' report_json.json
            exit 1
          fi
      
      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-api-baseline-report
          path: |
            report_html.html
            report_md.md
            report_json.json
          retention-days: 90

  summary:
    name: ZAP Scan Summary
    runs-on: ubuntu-latest
    needs: [check-secrets, zap-admin, zap-api]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## ZAP Baseline Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date**: $(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.zap-admin.result }}" = "success" ]; then
            echo "- ✅ **Admin**: No high-risk vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.zap-admin.result }}" = "skipped" ]; then
            echo "- ⏭️ **Admin**: Skipped (target not configured)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **Admin**: Vulnerabilities detected - review artifacts" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.zap-api.result }}" = "success" ]; then
            echo "- ✅ **API**: No high-risk vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.zap-api.result }}" = "skipped" ]; then
            echo "- ⏭️ **API**: Skipped (target not configured)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **API**: Vulnerabilities detected - review artifacts" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note**: Baseline scans test unauthenticated routes only. For comprehensive security testing, implement authenticated scanning." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **Download Reports**: Check workflow artifacts for detailed HTML/JSON reports" >> $GITHUB_STEP_SUMMARY
