name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and integration tests
        run: pnpm test

  # Lightweight iOS gate — runs on GitHub-hosted macOS, satisfies the required
  # branch-protection check.  It validates static iOS health (App Store baseline
  # and Info.plist permissions) and skips if no iOS-relevant files changed.
  # The full simulator test suite (XCTest / xcodebuild) runs in ios-xctest-suite
  # on a self-hosted runner; it is informational and does not block merge.
  ios-fast-regression:
    needs: quality
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect iOS-relevant changes
        id: changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            DIFF=$(git diff --name-only "$BASE" "$HEAD" || true)
          else
            DIFF=$(git diff --name-only HEAD~1 HEAD || true)
          fi
          echo "DIFF<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Gate — skip if no iOS-relevant changes
        id: gate
        shell: bash
        run: |
          DIFF="${{ steps.changes.outputs.DIFF }}"
          echo "$DIFF" | sed 's/^/changed: /'
          if echo "$DIFF" | grep -Eq '^(apps/mobile/|packages/|pnpm-lock\.yaml|\.github/workflows/)'; then
            echo "run_ios=true"  >> $GITHUB_OUTPUT
            echo "iOS-relevant changes detected — running static checks"
          else
            echo "run_ios=false" >> $GITHUB_OUTPUT
            echo "No iOS-relevant changes — skipping"
          fi

      - name: Check App Store baseline (deployment target + armv7 removal)
        if: steps.gate.outputs.run_ios == 'true'
        run: bash scripts/ios/check-appstore-baseline.sh

      - name: Check Info.plist permission usage strings
        if: steps.gate.outputs.run_ios == 'true'
        run: bash scripts/ios/check-info-plist-permissions.sh

  # Full XCTest simulator suite — requires a self-hosted macOS runner with Xcode
  # and an iPhone 16 simulator.  Optional (not required by branch protection).
  ios-xctest-suite:
    needs: ios-fast-regression
    if: false   # disabled until a self-hosted macOS runner is registered
    runs-on: [self-hosted, macOS, mobile]
    timeout-minutes: 45
    concurrency:
      group: ios-simulator-lanes
      cancel-in-progress: false
    env:
      IOS_DESTINATION: platform=iOS Simulator,name=iPhone 16
      XCODEBUILD_LOG: /tmp/xcodebuild-fastregression.log
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run iOS FastRegression (xcodebuild)
        run: pnpm ios:test:fast:regression

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fastregression-xcodebuild-log
          path: /tmp/xcodebuild-fastregression.log
          retention-days: 7

      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fastregression-service-logs
          path: |
            apps/mobile/.metro-8082.log
            apps/mobile/.api-8081.log
          retention-days: 7
