name: ci

on:
  pull_request:
  push:
    branches:
      - main

# Opt all actions into Node.js 24 now rather than waiting for the forced
# migration on 2026-06-02.  Eliminates "Node.js 20 actions are deprecated"
# warnings from actions/checkout, actions/setup-node, pnpm/action-setup,
# and actions/upload-artifact.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and integration tests
        run: pnpm test

  # Lightweight iOS gate — runs on GitHub-hosted macOS, satisfies the required
  # branch-protection check.  It validates static iOS health (App Store baseline
  # and Info.plist permissions) and skips if no iOS-relevant files changed.
  # The full simulator test suite (XCTest / xcodebuild) runs in ios-xctest-suite
  # on a self-hosted runner; it is informational and does not block merge.
  ios-fast-regression:
    needs: quality
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect iOS-relevant changes
        id: changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            DIFF=$(git diff --name-only "$BASE" "$HEAD" || true)
          else
            DIFF=$(git diff --name-only HEAD~1 HEAD || true)
          fi
          echo "DIFF<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Gate — skip if no iOS-relevant changes
        id: gate
        shell: bash
        run: |
          DIFF="${{ steps.changes.outputs.DIFF }}"
          echo "$DIFF" | sed 's/^/changed: /'
          if echo "$DIFF" | grep -Eq '^(apps/mobile/|packages/|pnpm-lock\.yaml|\.github/workflows/)'; then
            echo "run_ios=true"  >> $GITHUB_OUTPUT
            echo "iOS-relevant changes detected — running static checks"
          else
            echo "run_ios=false" >> $GITHUB_OUTPUT
            echo "No iOS-relevant changes — skipping"
          fi

      - name: Check App Store baseline (deployment target + armv7 removal)
        if: steps.gate.outputs.run_ios == 'true'
        run: bash scripts/ios/check-appstore-baseline.sh

      - name: Check Info.plist permission usage strings
        if: steps.gate.outputs.run_ios == 'true'
        run: bash scripts/ios/check-info-plist-permissions.sh

  # Full XCTest simulator suite — runs on the local self-hosted macOS runner.
  # Uses pre-installed node/pnpm/pod from the machine; no setup-node or
  # setup-pnpm actions to avoid PATH conflicts with Expo's autolinking.
  # Optional (not required by branch protection).
  #
  # Runs all three xctestplan configurations in sequence within a single job
  # so they share the same pod install, Metro process, and simulator state:
  #   1. FastRegression  (5 tests)  — auth entry, phone input, OTP, password login
  #   2. LocalAuthE2E   (10 tests)  — deeper auth flows with real OTP bypass
  #   3. Accessibility   (3 tests)  — VoiceOver / XCUIElement accessibility audits
  ios-xctest-suite:
    needs: ios-fast-regression
    runs-on: [self-hosted, macOS, mobile]
    timeout-minutes: 60
    concurrency:
      group: ios-simulator-lanes
      cancel-in-progress: false
    env:
      IOS_DESTINATION: platform=iOS Simulator,name=iPhone 16,OS=18.0
      # Metro coordinates — baked here so all three runner scripts inherit them.
      RCT_METRO_HOST: "127.0.0.1"
      RCT_METRO_PORT: "8082"
      PATH: /Users/anitavallabha/.nvm/versions/node/v20.19.6/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install CocoaPods dependencies
        run: cd apps/mobile/ios && pod install --deployment

      # ── FastRegression ─────────────────────────────────────────────────────
      - name: Run iOS FastRegression (xcodebuild)
        env:
          XCODEBUILD_LOG: /tmp/xcodebuild-fastregression.log
        run: pnpm ios:test:fast:regression

      - name: Upload FastRegression xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xctest-fastregression-log
          path: /tmp/xcodebuild-fastregression.log
          retention-days: 7

      # ── LocalAuthE2E ───────────────────────────────────────────────────────
      # Metro is force-restarted by run-xctest-config.sh; the bundle is already
      # in Metro's transform cache from FastRegression so warm-up is near-instant.
      - name: Run iOS LocalAuthE2E (xcodebuild)
        env:
          XCODEBUILD_LOG: /tmp/xcodebuild-local-auth-e2e.log
        run: pnpm ios:test:local-auth:ci

      - name: Upload LocalAuthE2E xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xctest-local-auth-e2e-log
          path: /tmp/xcodebuild-local-auth-e2e.log
          retention-days: 7

      # ── Accessibility ──────────────────────────────────────────────────────
      - name: Run iOS Accessibility (xcodebuild)
        env:
          XCODEBUILD_LOG: /tmp/xcodebuild-accessibility.log
        run: pnpm ios:test:a11y:ci

      - name: Upload Accessibility xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xctest-accessibility-log
          path: /tmp/xcodebuild-accessibility.log
          retention-days: 7

      # ── Service logs (failure only) ────────────────────────────────────────
      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xctest-service-logs
          path: |
            apps/mobile/.metro-8082.log
            apps/mobile/.api-8081.log
          retention-days: 7

  # ── Android build ────────────────────────────────────────────────────────
  # Runs on GitHub-hosted ubuntu-latest — no self-hosted Android runner required.
  # Validates two independent things:
  #   1. expo export: the React Native JS bundle builds cleanly for Android
  #   2. assembleDebug: Kotlin/Java + native linking succeed and produce an APK
  # The full Appium E2E suite is in android-e2e (self-hosted, informational).
  android-build:
    name: Android build (debug APK)
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install Android SDK components
        # Ensures the exact build-tools, platform, and NDK versions referenced
        # in apps/mobile/android/build.gradle are available.  sdkmanager skips
        # packages that are already installed, so this is safe to run every time.
        run: |
          sdkmanager \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "platform-tools" \
            "ndk;25.1.8937393" \
            2>&1 | grep -v "^\[" || true

      - name: Android JS bundle export
        # Validates the React Native JS bundle compiles for Android.
        # assembleDebug (debug) uses Metro at runtime, so this is the only
        # step that exercises the full JS → Hermes bytecode pipeline in CI.
        working-directory: apps/mobile
        env:
          EXPO_NO_TELEMETRY: "1"
        run: pnpm exec expo export --platform android --output-dir ./dist-export --clear

      - name: Assemble debug APK (x86_64)
        # Single-architecture build keeps CI under 10 min with a warm Gradle cache.
        # All four architectures are used in release builds; this gate is
        # sufficient for catching compile errors.
        working-directory: apps/mobile/android
        run: |
          ./gradlew assembleDebug \
            -PreactNativeArchitectures=x86_64 \
            --no-daemon \
            --warning-mode=none

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ── Android Appium E2E ────────────────────────────────────────────────────
  # Full WebdriverIO/Appium suite — runs on the local self-hosted macOS runner.
  # Requires a live Android emulator, running API server, and Metro bundler.
  # Downloads the debug APK produced by android-build instead of rebuilding it.
  # Optional (not required by branch protection), mirrors ios-xctest-suite pattern.
  #
  # Environment the runner must have pre-configured:
  #   - Android SDK at ~/Library/Android/sdk with platform-tools + emulator
  #   - AVD named Pixel_8 (override via AVD_NAME env if different)
  #   - Appium 3.x installed globally (npm i -g appium) or via pnpm
  android-e2e:
    name: Android E2E (Appium/WebdriverIO)
    needs: android-build
    runs-on: [self-hosted, macOS, mobile]
    timeout-minutes: 30
    concurrency:
      group: android-emulator-lane
      cancel-in-progress: false
    env:
      ANDROID_HOME: /Users/anitavallabha/Library/Android/sdk
      ANDROID_SDK_ROOT: /Users/anitavallabha/Library/Android/sdk
      AVD_NAME: Pixel_8
      MOBILE_API_HEALTH_URL: http://localhost:8081/api/health
      MOBILE_METRO_PORT: "8082"
      EXPO_NO_TELEMETRY: "1"
      PATH: /Users/anitavallabha/.nvm/versions/node/v20.19.6/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/

      # ── Emulator ───────────────────────────────────────────────────────────
      - name: Ensure Android emulator is running
        shell: bash
        run: |
          ADB="$ANDROID_HOME/platform-tools/adb"
          EMULATOR="$ANDROID_HOME/emulator/emulator"

          if "$ADB" devices | grep -E -q '[[:space:]]device$'; then
            echo "Android device/emulator already connected"
          else
            if ! "$EMULATOR" -list-avds | grep -qx "$AVD_NAME"; then
              echo "AVD '$AVD_NAME' not found. Available AVDs:"
              "$EMULATOR" -list-avds || true
              exit 1
            fi
            echo "Starting emulator: $AVD_NAME"
            nohup "$EMULATOR" -avd "$AVD_NAME" \
              -netdelay none -netspeed full -no-window -no-boot-anim \
              > /tmp/b2b-android-emulator.log 2>&1 &
            echo "EMULATOR_PID=$!" >> "$GITHUB_ENV"

            echo "Waiting for emulator boot (up to 180 s)…"
            "$ADB" wait-for-device
            elapsed=0
            until [ "$("$ADB" shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ]; do
              sleep 2; elapsed=$((elapsed + 2))
              [ $elapsed -ge 180 ] && echo "Emulator boot timed out" && exit 1
            done
            echo "Emulator booted"
            "$ADB" devices
          fi

      # ── API server ─────────────────────────────────────────────────────────
      - name: Ensure API server is running
        shell: bash
        run: |
          if curl -fsS "$MOBILE_API_HEALTH_URL" >/dev/null 2>&1; then
            echo "API already running at $MOBILE_API_HEALTH_URL"
          else
            echo "Starting API server (log: apps/mobile/.api-8081.log)"
            PORT=8081 ./start-api.sh > apps/mobile/.api-8081.log 2>&1 &
            echo "API_PID=$!" >> "$GITHUB_ENV"

            elapsed=0
            until curl -fsS "$MOBILE_API_HEALTH_URL" >/dev/null 2>&1; do
              sleep 2; elapsed=$((elapsed + 2))
              [ $elapsed -ge 60 ] && echo "API health check timed out" && exit 1
            done
            echo "API ready"
          fi

      # ── Metro bundler ──────────────────────────────────────────────────────
      - name: Start Metro bundler (force-fresh)
        shell: bash
        run: |
          # Always restart Metro so the bundle reflects the current checkout.
          # Mirrors the force-restart pattern used in ios-xctest-suite.
          lsof -tiTCP:"$MOBILE_METRO_PORT" -sTCP:LISTEN 2>/dev/null | xargs kill 2>/dev/null || true
          sleep 1

          cd apps/mobile
          EXPO_NO_TELEMETRY=1 pnpm exec expo start \
            --dev-client --port "$MOBILE_METRO_PORT" --clear \
            > ".metro-${MOBILE_METRO_PORT}.log" 2>&1 &
          echo "METRO_PID=$!" >> "$GITHUB_ENV"

          elapsed=0
          until curl -fsS "http://localhost:${MOBILE_METRO_PORT}/status" >/dev/null 2>&1; do
            sleep 2; elapsed=$((elapsed + 2))
            [ $elapsed -ge 90 ] && echo "Metro startup timed out" && exit 1
          done
          echo "Metro ready at port $MOBILE_METRO_PORT"

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Run Android E2E (Appium/WebdriverIO)
        run: pnpm test:e2e:mobile:android

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload WebdriverIO + Appium logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-wdio-logs
          path: |
            tests/e2e-mobile/wdio-appium.log
            tests/e2e-mobile/artifacts/
            tests/e2e-mobile/screenshots/
          retention-days: 7

      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-service-logs
          path: |
            apps/mobile/.metro-8082.log
            apps/mobile/.api-8081.log
            /tmp/b2b-android-emulator.log
          retention-days: 7

      # ── Cleanup ────────────────────────────────────────────────────────────
      - name: Stop background services
        if: always()
        shell: bash
        run: |
          [ -n "${METRO_PID:-}" ] && kill "$METRO_PID" 2>/dev/null || true
          [ -n "${API_PID:-}"   ] && kill "$API_PID"   2>/dev/null || true
          # Leave the emulator running for the next job (warm start benefit);
          # the concurrency group ensures only one job uses it at a time.

  # ── Web E2E ──────────────────────────────────────────────────────────────
  web-e2e:
    name: Web E2E (admin)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/admin
    env:
      # Dev JWT secret — required for /api/v1/dev/mint-token used in auth helper
      JWT_SECRET: dev-secret-key-change-in-production
      DEV_ONLY: "true"
      # All NestJS API calls are mocked in tests; URL only needs to be consistent
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Web E2E tests
        run: pnpm test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-admin
          path: apps/admin/playwright-report/
          retention-days: 7
