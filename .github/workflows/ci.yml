name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and integration tests
        run: pnpm test

  web-e2e-docker:
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm playwright install --with-deps chromium

      - name: Run web docker E2E
        run: pnpm test:e2e:web:docker:stack

  ios-fast-regression:
    needs: quality
    # Requires a self-hosted macOS runner with:
    #   - Xcode installed with an "iPhone 16" simulator available
    #     (simulator does NOT need to be pre-booted; run-fastregression.sh
    #      calls `xcrun simctl boot` before xcodebuild)
    #   - API environment (DATABASE_URL, LOCAL_TEST_PASSWORD_ENABLED=true, etc.)
    #     available — testPasswordLoginHappyPath calls POST /auth/login-password.
    runs-on: [self-hosted, macOS, mobile]
    timeout-minutes: 45
    concurrency:
      group: ios-simulator-lanes
      cancel-in-progress: false
    env:
      # Override default destination from run-fastregression.sh for this runner.
      IOS_DESTINATION: platform=iOS Simulator,name=iPhone 16
      # Fixed log path so the upload-artifact step can reference it.
      XCODEBUILD_LOG: /tmp/xcodebuild-fastregression.log
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check App Store baseline (deployment target + armv7 removal)
        # Verifies ios.deploymentTarget in Podfile.properties.json, all
        # IPHONEOS_DEPLOYMENT_TARGET entries in project.pbxproj, and that
        # UIRequiredDeviceCapabilities contains no armv7 (32-bit, deprecated iOS 11+).
        run: bash scripts/ios/check-appstore-baseline.sh

      - name: Check Info.plist permission usage strings
        # Fails fast if NSLocationWhenInUseUsageDescription or NSCameraUsageDescription
        # are missing, avoiding an App Store rejection or runtime crash from the
        # missing-key NSInvalidArgumentException (iOS 10+).
        run: bash scripts/ios/check-info-plist-permissions.sh

      - name: Run iOS FastRegression
        # scripts/ios/run-fastregression.sh starts Metro + API, runs xcodebuild,
        # prints first assertion failures on non-zero exit, and propagates the
        # xcodebuild exit code so this step fails the job on test failure.
        run: pnpm ios:test:fast:regression

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fastregression-xcodebuild-log
          path: /tmp/xcodebuild-fastregression.log
          retention-days: 7

      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fastregression-service-logs
          path: |
            apps/mobile/.metro-8082.log
            apps/mobile/.api-8081.log
          retention-days: 7
