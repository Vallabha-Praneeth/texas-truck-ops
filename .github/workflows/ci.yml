name: ci

on:
  pull_request:
  push:
    branches:
      - main

# Opt all actions into Node.js 24 now rather than waiting for the forced
# migration on 2026-06-02.  Eliminates "Node.js 20 actions are deprecated"
# warnings from actions/checkout, actions/setup-node, pnpm/action-setup,
# and actions/upload-artifact.
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and integration tests
        run: pnpm test

  # Lightweight iOS gate — runs on GitHub-hosted macOS, satisfies the required
  # branch-protection check.  It validates static iOS health (App Store baseline
  # and Info.plist permissions) and skips if no iOS-relevant files changed.
  # The full simulator test suite (XCTest / xcodebuild) runs in ios-xctest-suite
  # on a self-hosted runner; it is informational and does not block merge.
  ios-fast-regression:
    needs: quality
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect iOS-relevant changes
        id: changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            DIFF=$(git diff --name-only "$BASE" "$HEAD" || true)
          else
            DIFF=$(git diff --name-only HEAD~1 HEAD || true)
          fi
          echo "DIFF<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Gate — skip if no iOS-relevant changes
        id: gate
        shell: bash
        run: |
          DIFF="${{ steps.changes.outputs.DIFF }}"
          echo "$DIFF" | sed 's/^/changed: /'
          if echo "$DIFF" | grep -Eq '^(apps/mobile/|packages/|pnpm-lock\.yaml|\.github/workflows/)'; then
            echo "run_ios=true"  >> $GITHUB_OUTPUT
            echo "iOS-relevant changes detected — running static checks"
          else
            echo "run_ios=false" >> $GITHUB_OUTPUT
            echo "No iOS-relevant changes — skipping"
          fi

      - name: Check App Store baseline (deployment target + armv7 removal)
        if: steps.gate.outputs.run_ios == 'true'
        run: bash scripts/ios/check-appstore-baseline.sh

      - name: Check Info.plist permission usage strings
        if: steps.gate.outputs.run_ios == 'true'
        run: bash scripts/ios/check-info-plist-permissions.sh

  # Full XCTest simulator suite — runs on the local self-hosted macOS runner.
  # Uses pre-installed node/pnpm/pod from the machine; no setup-node or
  # setup-pnpm actions to avoid PATH conflicts with Expo's autolinking.
  # Optional (not required by branch protection).
  #
  # Runs all three xctestplan configurations in sequence within a single job
  # so they share the same pod install, Metro process, and simulator state:
  #   1. FastRegression  (5 tests)  — auth entry, phone input, OTP, password login
  #   2. LocalAuthE2E   (10 tests)  — deeper auth flows with real OTP bypass
  #   3. Accessibility   (3 tests)  — VoiceOver / XCUIElement accessibility audits
  ios-xctest-suite:
    needs: ios-fast-regression
    runs-on: [self-hosted, macOS, mobile]
    timeout-minutes: 60
    concurrency:
      group: ios-simulator-lanes
      cancel-in-progress: false
    env:
      IOS_DESTINATION: platform=iOS Simulator,name=iPhone 16,OS=18.0
      # Metro coordinates — baked here so all three runner scripts inherit them.
      RCT_METRO_HOST: "127.0.0.1"
      RCT_METRO_PORT: "8082"
      PATH: /Users/anitavallabha/.nvm/versions/node/v20.19.6/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install CocoaPods dependencies
        run: cd apps/mobile/ios && pod install --deployment

      # ── FastRegression ─────────────────────────────────────────────────────
      - name: Run iOS FastRegression (xcodebuild)
        env:
          XCODEBUILD_LOG: /tmp/xcodebuild-fastregression.log
        run: pnpm ios:test:fast:regression

      - name: Upload FastRegression xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xctest-fastregression-log
          path: /tmp/xcodebuild-fastregression.log
          retention-days: 7

      # ── LocalAuthE2E ───────────────────────────────────────────────────────
      # Metro is force-restarted by run-xctest-config.sh; the bundle is already
      # in Metro's transform cache from FastRegression so warm-up is near-instant.
      - name: Run iOS LocalAuthE2E (xcodebuild)
        env:
          XCODEBUILD_LOG: /tmp/xcodebuild-local-auth-e2e.log
        run: pnpm ios:test:local-auth:ci

      - name: Upload LocalAuthE2E xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xctest-local-auth-e2e-log
          path: /tmp/xcodebuild-local-auth-e2e.log
          retention-days: 7

      # ── Accessibility ──────────────────────────────────────────────────────
      - name: Run iOS Accessibility (xcodebuild)
        env:
          XCODEBUILD_LOG: /tmp/xcodebuild-accessibility.log
        run: pnpm ios:test:a11y:ci

      - name: Upload Accessibility xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xctest-accessibility-log
          path: /tmp/xcodebuild-accessibility.log
          retention-days: 7

      # ── Service logs (failure only) ────────────────────────────────────────
      - name: Upload service logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xctest-service-logs
          path: |
            apps/mobile/.metro-8082.log
            apps/mobile/.api-8081.log
          retention-days: 7

  # ── Android build ────────────────────────────────────────────────────────
  # Runs on GitHub-hosted ubuntu-latest — no self-hosted Android runner required.
  # Validates two independent things:
  #   1. expo export: the React Native JS bundle builds cleanly for Android
  #   2. assembleDebug: Kotlin/Java + native linking succeed and produce an APK
  # The Appium E2E suite (tests/e2e-mobile/) requires a live emulator + API +
  # Metro and is intended for local/self-hosted runs via test:e2e:mobile:android.
  android-build:
    name: Android build (debug APK)
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install Android SDK components
        # Ensures the exact build-tools, platform, and NDK versions referenced
        # in apps/mobile/android/build.gradle are available.  sdkmanager skips
        # packages that are already installed, so this is safe to run every time.
        run: |
          sdkmanager \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "platform-tools" \
            "ndk;25.1.8937393" \
            2>&1 | grep -v "^\[" || true

      - name: Android JS bundle export
        # Validates the React Native JS bundle compiles for Android.
        # assembleDebug (debug) uses Metro at runtime, so this is the only
        # step that exercises the full JS → Hermes bytecode pipeline in CI.
        working-directory: apps/mobile
        env:
          EXPO_NO_TELEMETRY: "1"
        run: pnpm exec expo export --platform android --output-dir ./dist-export --clear

      - name: Assemble debug APK (x86_64)
        # Single-architecture build keeps CI under 10 min with a warm Gradle cache.
        # All four architectures are used in release builds; this gate is
        # sufficient for catching compile errors.
        working-directory: apps/mobile/android
        run: |
          ./gradlew assembleDebug \
            -PreactNativeArchitectures=x86_64 \
            --no-daemon \
            --warning-mode=none

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ── Web E2E ──────────────────────────────────────────────────────────────
  web-e2e:
    name: Web E2E (admin)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/admin
    env:
      # Dev JWT secret — required for /api/v1/dev/mint-token used in auth helper
      JWT_SECRET: dev-secret-key-change-in-production
      DEV_ONLY: "true"
      # All NestJS API calls are mocked in tests; URL only needs to be consistent
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Web E2E tests
        run: pnpm test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-admin
          path: apps/admin/playwright-report/
          retention-days: 7
