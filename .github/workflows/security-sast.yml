name: Security SAST

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/admin/**'
      - 'apps/mobile/**'
      - 'packages/api/**'
      - 'packages/shared/**'
      - 'packages/db/**'
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - '*.config.{js,ts,mjs}'
      - 'tsconfig*.json'
      - '.github/workflows/security-*.yml'
      - 'docs/security/**'
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'apps/mobile/**'
      - 'packages/api/**'
      - 'packages/shared/**'
      - 'packages/db/**'
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - '*.config.{js,ts,mjs}'
      - 'tsconfig*.json'
      - '.github/workflows/security-*.yml'
      - 'docs/security/**'
  schedule:
    - cron: '0 5 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/security-audit
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Check for critical findings
        if: always()
        run: |
          if [ -f semgrep.sarif ]; then
            critical=$(jq '[.runs[].results[] | select(.level=="error")] | length' semgrep.sarif || echo "0")
            high=$(jq '[.runs[].results[] | select(.level=="warning")] | length' semgrep.sarif || echo "0")
            echo "Found $critical critical and $high high severity findings"
            if [ "$critical" -gt 0 ]; then
              echo "::error::Critical security issues detected by Semgrep"
              exit 1
            fi
          fi
